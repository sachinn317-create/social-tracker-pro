<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Social Tracker — Story &amp; Motion</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  html,body,#root{height:100%;margin:0;background:#FAF9F6;}
  *::-webkit-scrollbar{height:9px;width:9px}
  *::-webkit-scrollbar-thumb{background:#E0DBD0;border-radius:5px}
  input,select,textarea{outline:none}
  input:focus,select:focus,textarea:focus{border-color:#B08833 !important}
  .sm-btn{transition:all .15s ease}
  .sm-btn:hover{filter:brightness(.97)}
  .row-hover:hover{background:#F4F2ED}
  .spin{animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
  @media print{
    .no-print{display:none!important}
    body{background:#fff!important}
    body *{visibility:hidden}
    .report,.report *{visibility:visible}
    .report{position:absolute;left:0;top:0;width:100%;padding:0!important}
    .report .card{break-inside:avoid}
    @page{margin:14mm}
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

/* ================================================================
   CONFIG — paste your two Supabase values between the quotes.
   Find them in Supabase → Project Settings → API.
   (The anon key is safe to put here — your row-level security is
   what protects the data, not the secrecy of this key.)
================================================================ */
const SUPABASE_URL = "https://hzqjtbgwbciqlwsdafmi.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh6cWp0Ymd3YmNpcWx3c2RhZm1pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MTg4MDMsImV4cCI6MjA5Njk5NDgwM30.xExKTiwurfYx5fPKe0hWWWPbzNndaElAeQXfajUWVMM";
/* ================================================================ */

const T = {
  bg:"#FAF9F6", surface:"#FFFFFF", surface2:"#F4F2ED", line:"#E7E2D7", lineSoft:"#EFEBE2",
  ink:"#1C1A16", sub:"#6C665C", faint:"#9C968B",
  brass:"#A87E2E", brassSoft:"#F3EAD2", steel:"#3D6678", good:"#3C7A4C", warn:"#B07A2E", bad:"#AF4329",
  mono:"ui-monospace,'SF Mono','JetBrains Mono',Menlo,Consolas,monospace",
  sans:"'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif",
};

const FORMATS = ["Reel","Carousel","Single image","Story"];
const CHECKPOINTS = ["1d","3d","7d","30d","custom"];

const configured = SUPABASE_URL.startsWith("http") && SUPABASE_ANON_KEY.length > 20;
const sb = configured ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

/* icons */
const ICONS={
  plus:'<path d="M12 5v14"/><path d="M5 12h14"/>',
  logout:'<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/>',
  folder:'<path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7l-2-2H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2z"/>',
  chevron:'<path d="M6 9l6 6 6-6"/>',
  trash:'<path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/>',
  x:'<path d="M18 6L6 18"/><path d="M6 6l12 12"/>',
  clock:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
  loader:'<path d="M21 12a9 9 0 1 1-6.2-8.6"/>',
  eye:'<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>',
  users:'<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.9"/><path d="M16 3.1a4 4 0 0 1 0 7.8"/>',
  bookmark:'<path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>',
  target:'<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.4"/>',
  check:'<path d="M20 6L9 17l-5-5"/>',
};
function Icon({name,size=16,color="currentColor",style,cls}){
  return <svg className={cls} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0,...style}} dangerouslySetInnerHTML={{__html:ICONS[name]||""}}/>;
}

/* helpers */
const num=v=>isNaN(parseFloat(v))?0:parseFloat(v);
const fmt=n=>{n=num(n);if(n>=1e6)return(n/1e6).toFixed(n%1e6?1:0)+"M";if(n>=1e3)return(n/1e3).toFixed(n%1e3?1:0)+"k";return String(Math.round(n));};
const interactions=s=>num(s.likes)+num(s.comments)+num(s.shares)+num(s.saves);
const er=s=>num(s.reach)>0?(interactions(s)/num(s.reach))*100:0;
const nowLocal=()=>{const d=new Date();d.setMinutes(d.getMinutes()-d.getTimezoneOffset());return d.toISOString().slice(0,16);};
const toISO=v=>v?new Date(v).toISOString():null;
const fmtDT=iso=>{if(!iso)return"—";const d=new Date(iso);return d.toLocaleDateString(undefined,{weekday:"short",day:"numeric",month:"short"})+" · "+d.toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit"});};
const daysBetween=(a,b)=>Math.round((new Date(b)-new Date(a))/86400000);
const suggestCheckpoint=(pub,meas)=>{const d=daysBetween(pub,meas);if(d<=1)return"1d";if(d<=3)return"3d";if(d<=7)return"7d";if(d<=30)return"30d";return"custom";};

/* ============================ ROOT ============================ */
function Root(){
  const [session,setSession]=useState(null);
  const [profile,setProfile]=useState(null);
  const [booting,setBooting]=useState(true);

  useEffect(()=>{
    if(!configured)return;
    sb.auth.getSession().then(({data})=>{setSession(data.session);if(!data.session)setBooting(false);});
    const {data:sub}=sb.auth.onAuthStateChange((_e,s)=>{setTimeout(()=>{setSession(s);if(!s){setProfile(null);setBooting(false);}},0);});
    return ()=>sub.subscription.unsubscribe();
  },[]);

  useEffect(()=>{
    if(!session)return;
    (async()=>{
      const {data}=await sb.from("profiles").select("*").eq("id",session.user.id).single();
      setProfile(data||{id:session.user.id,role:"client",client_id:null});
      setBooting(false);
    })();
  },[session]);

  if(!configured) return <ConfigNeeded/>;
  if(booting) return <Splash/>;
  if(!session) return <Login/>;
  if(profile && profile.role==="admin") return <AdminApp session={session}/>;
  return <ClientApp session={session} profile={profile}/>;
}

function Shell({children}){
  return <div style={{background:T.bg,color:T.ink,fontFamily:T.sans,minHeight:"100%"}} className="w-full">
    <div className="max-w-6xl mx-auto px-4 sm:px-6 py-6">{children}</div></div>;
}
function Splash(){return <Shell><div className="flex items-center justify-center py-24"><Icon name="loader" size={26} color={T.brass} cls="spin"/></div></Shell>;}

function ConfigNeeded(){
  return <Shell><div className="rounded-xl p-6 mt-10" style={{background:T.surface,border:"1px solid "+T.line,maxWidth:560,margin:"40px auto"}}>
    <h2 style={{fontSize:18,fontWeight:700}}>Almost there — add your Supabase keys</h2>
    <p style={{color:T.sub,fontSize:14,marginTop:8,lineHeight:1.6}}>Open this file and paste your <strong>Project URL</strong> and <strong>anon public key</strong> into the CONFIG block near the top (Supabase → Project Settings → API). Then redeploy.</p>
  </div></Shell>;
}

/* ============================ LOGIN =========================== */
function Login(){
  const [email,setEmail]=useState(""); const [pw,setPw]=useState("");
  const [err,setErr]=useState(null); const [busy,setBusy]=useState(false);
  const submit=async()=>{
    setErr(null);setBusy(true);
    const {error}=await sb.auth.signInWithPassword({email:email.trim(),password:pw});
    setBusy(false);
    if(error)setErr(error.message);
  };
  return <Shell>
    <div style={{maxWidth:380,margin:"60px auto"}}>
      <div className="text-center mb-7">
        <div style={{fontFamily:T.mono,fontSize:11,letterSpacing:"0.2em",color:T.faint}}>STORY &amp; MOTION</div>
        <h1 style={{fontSize:24,fontWeight:700,marginTop:6}}>Social Tracker</h1>
        <p style={{color:T.sub,fontSize:13,marginTop:4}}>Sign in to your reporting dashboard.</p>
      </div>
      <div className="rounded-xl p-5" style={{background:T.surface,border:"1px solid "+T.line}}>
        <label className="block mb-3"><span style={{fontSize:12,color:T.sub}}>Email</span>
          <input value={email} onChange={e=>setEmail(e.target.value)} type="email" className="w-full mt-1 px-3 py-2.5 rounded-lg text-sm" style={{background:T.bg,border:"1px solid "+T.line,color:T.ink}}/></label>
        <label className="block mb-4"><span style={{fontSize:12,color:T.sub}}>Password</span>
          <input value={pw} onChange={e=>setPw(e.target.value)} type="password" onKeyDown={e=>e.key==="Enter"&&submit()} className="w-full mt-1 px-3 py-2.5 rounded-lg text-sm" style={{background:T.bg,border:"1px solid "+T.line,color:T.ink}}/></label>
        {err&&<div className="rounded-lg px-3 py-2 mb-3 text-sm" style={{background:"#FBEEEA",color:T.bad,border:"1px solid #F0D4CC"}}>{err}</div>}
        <button onClick={submit} disabled={busy} className="sm-btn w-full py-2.5 rounded-lg text-sm font-semibold flex items-center justify-center gap-2" style={{background:T.brass,color:"#fff",opacity:busy?.7:1}}>
          {busy&&<Icon name="loader" size={15} color="#fff" cls="spin"/>} Sign in
        </button>
      </div>
      <p style={{color:T.faint,fontSize:11.5,textAlign:"center",marginTop:12}}>Accounts are created by Story &amp; Motion. Trouble signing in? Contact your account manager.</p>
    </div>
  </Shell>;
}

function Header({title,sub,email,right}){
  return <div className="flex items-start justify-between gap-4 mb-6">
    <div>
      <div style={{fontFamily:T.mono,fontSize:11,letterSpacing:"0.18em",color:T.faint}}>STORY &amp; MOTION</div>
      <h1 style={{fontSize:24,fontWeight:700,letterSpacing:"-0.02em",marginTop:3}}>{title}</h1>
      {sub&&<p style={{color:T.sub,fontSize:13,marginTop:2}}>{sub}</p>}
    </div>
    <div className="flex items-center gap-2 shrink-0">
      {right}
      <button onClick={()=>sb.auth.signOut()} className="sm-btn flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm" style={{background:T.surface,border:"1px solid "+T.line,color:T.sub}} title={email}>
        <Icon name="logout" size={15} color={T.sub}/><span className="hidden sm:inline">Sign out</span>
      </button>
    </div>
  </div>;
}

/* ========================== ADMIN APP ========================= */
function AdminApp({session}){
  const [clients,setClients]=useState([]);
  const [currentId,setCurrentId]=useState(()=>{try{return localStorage.getItem("smx_admin_client")||null;}catch{return null;}});
  const pickClient=id=>{setCurrentId(id);try{localStorage.setItem("smx_admin_client",id);}catch{}};
  const [tab,setTab]=useState("posts");
  const [loading,setLoading]=useState(true);
  const [toast,setToast]=useState(null);
  const [newClient,setNewClient]=useState(false);

  const flash=(m,bad)=>{setToast({m,bad});setTimeout(()=>setToast(null),3500);};
  const loadClients=async()=>{
    const {data,error}=await sb.from("clients").select("*").order("created_at");
    if(error)flash(error.message,true);
    setClients(data||[]);
    if(data&&data.length){const ok=currentId&&data.some(c=>c.id===currentId);if(!ok)pickClient(data[0].id);}
    setLoading(false);
  };
  useEffect(()=>{loadClients();},[]);
  const current=clients.find(c=>c.id===currentId);

  return <Shell>
    <Header title="Social Tracker" sub="Admin · all clients" email={session.user.email}
      right={<ClientSwitcher clients={clients} current={current} onPick={id=>{pickClient(id);setTab("posts");}} onNew={()=>setNewClient(true)}/>}/>
    {loading? <Splash/> :
     clients.length===0 ? <Empty title="No clients yet" body="Create your first client to start logging posts." action={<button onClick={()=>setNewClient(true)} className="sm-btn px-4 py-2 rounded-lg text-sm font-semibold" style={{background:T.brass,color:"#fff"}}>Add client</button>}/> :
     current ? <>
       <Tabs tab={tab} setTab={setTab} items={[["posts","Posts"],["account","Account & outcomes"],["overview","Overview"],["report","Report"]]}/>
       {tab==="posts" && <PostsAdmin client={current} flash={flash}/>}
       {tab==="account" && <AccountAdmin client={current} flash={flash}/>}
       {tab==="overview" && <OverviewView client={current}/>}
       {tab==="report" && <ReportView client={current}/>}
     </> : null}
    {newClient && <ClientModal onClose={()=>setNewClient(false)} onSaved={c=>{setNewClient(false);loadClients();pickClient(c.id);flash("Client added.");}} flash={flash}/>}
    {toast && <Toast {...toast}/>}
  </Shell>;
}

function ClientSwitcher({clients,current,onPick,onNew}){
  const [open,setOpen]=useState(false);
  return <div className="relative">
    <button onClick={()=>setOpen(o=>!o)} className="sm-btn flex items-center gap-2 px-3 py-2 rounded-lg text-sm" style={{background:T.surface,border:"1px solid "+T.line}}>
      <Icon name="folder" size={15} color={T.brass}/><span style={{fontWeight:600}}>{current?current.name:"Select client"}</span>
      {current&&<span style={{fontSize:11,color:T.sub,fontFamily:T.mono,padding:"1px 6px",border:"1px solid "+T.line,borderRadius:5}}>{current.industry}</span>}
      <Icon name="chevron" size={14} color={T.sub}/>
    </button>
    {open&&<>
      <div className="fixed inset-0 z-10" onClick={()=>setOpen(false)}/>
      <div className="absolute z-20 top-full mt-1 right-0 rounded-lg overflow-hidden w-64" style={{background:T.surface,border:"1px solid "+T.line,boxShadow:"0 12px 30px rgba(0,0,0,.12)"}}>
        {clients.map(c=><button key={c.id} onClick={()=>{onPick(c.id);setOpen(false);}} className="row-hover w-full text-left px-3 py-2.5 flex items-center justify-between gap-2" style={{borderBottom:"1px solid "+T.lineSoft}}>
          <span className="flex items-center gap-2 min-w-0"><Icon name="folder" size={14} color={current&&c.id===current.id?T.brass:T.faint}/><span className="truncate" style={{fontSize:13,fontWeight:current&&c.id===current.id?600:400}}>{c.name}</span></span>
          <span style={{fontSize:10.5,color:T.faint,fontFamily:T.mono}}>{c.industry}</span></button>)}
        <button onClick={()=>{setOpen(false);onNew();}} className="row-hover w-full text-left px-3 py-2.5 flex items-center gap-2" style={{color:T.brass}}><Icon name="plus" size={15} color={T.brass}/><span style={{fontSize:13,fontWeight:600}}>New client</span></button>
      </div>
    </>}
  </div>;
}

function Tabs({tab,setTab,items}){
  return <div className="flex gap-1 mb-6 overflow-x-auto" style={{borderBottom:"1px solid "+T.line}}>
    {items.map(([k,label])=><button key={k} onClick={()=>setTab(k)} className="px-3 sm:px-4 py-2.5 text-sm sm-btn whitespace-nowrap" style={{color:tab===k?T.ink:T.sub,borderBottom:"2px solid "+(tab===k?T.brass:"transparent"),marginBottom:-1,fontWeight:tab===k?600:400}}>{label}</button>)}
  </div>;
}

/* ---- posts + snapshots (admin) ---- */
function PostsAdmin({client,flash}){
  const [posts,setPosts]=useState(null);
  const [snaps,setSnaps]=useState({}); // postId -> [snapshots]
  const [addPost,setAddPost]=useState(false);
  const [addSnapFor,setAddSnapFor]=useState(null);

  const load=async()=>{
    const {data:p,error}=await sb.from("posts").select("*").eq("client_id",client.id).order("published_at",{ascending:false});
    if(error){flash(error.message,true);return;}
    setPosts(p||[]);
    const {data:s}=await sb.from("snapshots").select("*").eq("client_id",client.id).order("measured_at",{ascending:true});
    const by={};(s||[]).forEach(x=>{(by[x.post_id]=by[x.post_id]||[]).push(x);});
    setSnaps(by);
  };
  useEffect(()=>{setPosts(null);load();},[client.id]);

  const delPost=async id=>{if(!window.confirm("Delete this post and all its snapshots?"))return;const {error}=await sb.from("posts").delete().eq("id",id);if(error)flash(error.message,true);else load();};
  const delSnap=async id=>{const {error}=await sb.from("snapshots").delete().eq("id",id);if(error)flash(error.message,true);else load();};

  if(posts===null)return <Splash/>;
  return <div>
    <div className="flex justify-between items-center mb-4">
      <p style={{color:T.sub,fontSize:13}}>{posts.length} post{posts.length!==1?"s":""} · add dated readings to track each one over 1/3/7/30 days.</p>
      <button onClick={()=>setAddPost(true)} className="sm-btn flex items-center gap-1.5 px-3.5 py-2 rounded-lg text-sm font-semibold" style={{background:T.brass,color:"#fff"}}><Icon name="plus" size={16} color="#fff"/> New post</button>
    </div>
    {posts.length===0? <Empty title="No posts logged" body="Add a post, then record its numbers at each checkpoint."/> :
     <div className="flex flex-col gap-3">{posts.map(p=><PostCard key={p.id} post={p} snaps={snaps[p.id]||[]} onAddSnap={()=>setAddSnapFor(p)} onDelete={()=>delPost(p.id)} onDelSnap={delSnap}/>)}</div>}
    {addPost && <PostModal client={client} onClose={()=>setAddPost(false)} onSaved={()=>{setAddPost(false);load();flash("Post added.");}} flash={flash}/>}
    {addSnapFor && <SnapshotModal post={addSnapFor} client={client} onClose={()=>setAddSnapFor(null)} onSaved={()=>{setAddSnapFor(null);load();flash("Reading saved.");}} flash={flash}/>}
  </div>;
}

function PostCard({post,snaps,onAddSnap,onDelete,onDelSnap}){
  const [open,setOpen]=useState(false);
  const latest=snaps[snaps.length-1];
  return <div className="rounded-xl" style={{background:T.surface,border:"1px solid "+T.line}}>
    <div className="p-4 flex items-start justify-between gap-3">
      <div className="min-w-0">
        <div className="flex items-center gap-2 flex-wrap">
          <span style={{fontWeight:600,fontSize:14.5}}>{post.title||"Untitled"}</span>
          <span style={{fontSize:11,color:T.sub,fontFamily:T.mono,padding:"1px 6px",background:T.surface2,borderRadius:5}}>{post.format}</span>
        </div>
        <div style={{fontSize:12,color:T.faint,marginTop:3}}>Posted {fmtDT(post.published_at)}</div>
      </div>
      <button onClick={onDelete} className="sm-btn p-1.5 rounded"><Icon name="trash" size={15} color={T.faint}/></button>
    </div>
    <div className="px-4 pb-3 flex items-center gap-4 flex-wrap" style={{borderTop:"1px solid "+T.lineSoft,paddingTop:10}}>
      {latest? <>
        <Stat label="latest reach" v={fmt(latest.reach)}/><Stat label="eng%" v={er(latest).toFixed(1)}/><Stat label="saves" v={fmt(latest.saves)}/><Stat label="readings" v={snaps.length}/>
      </> : <span style={{fontSize:12.5,color:T.faint}}>No readings yet.</span>}
      <div className="ml-auto flex gap-2">
        {snaps.length>0&&<button onClick={()=>setOpen(o=>!o)} className="sm-btn px-2.5 py-1.5 rounded-lg text-xs" style={{border:"1px solid "+T.line,color:T.sub}}>{open?"Hide":"Timeline"}</button>}
        <button onClick={onAddSnap} className="sm-btn flex items-center gap-1 px-2.5 py-1.5 rounded-lg text-xs font-medium" style={{background:T.brassSoft,color:T.brass}}><Icon name="plus" size={13} color={T.brass}/> Add reading</button>
      </div>
    </div>
    {open&&snaps.length>0&&<div className="px-4 pb-4">
      <div className="rounded-lg overflow-hidden" style={{border:"1px solid "+T.lineSoft}}>
        <div className="grid px-3 py-2 text-xs" style={{gridTemplateColumns:".7fr 1.2fr .8fr .8fr .8fr .8fr 36px",background:T.surface2,color:T.faint,fontFamily:T.mono}}>
          <span>CP</span><span>MEASURED</span><span className="text-right">REACH</span><span className="text-right">ENG%</span><span className="text-right">SAVES</span><span className="text-right">FOLLOWS</span><span></span>
        </div>
        {snaps.map(s=><div key={s.id} className="grid px-3 py-2 items-center text-sm" style={{gridTemplateColumns:".7fr 1.2fr .8fr .8fr .8fr .8fr 36px",borderTop:"1px solid "+T.lineSoft}}>
          <span style={{fontFamily:T.mono,fontSize:12,color:T.brass}}>{s.checkpoint||"—"}</span>
          <span style={{fontSize:12,color:T.sub}}>{fmtDT(s.measured_at)}</span>
          <span className="text-right" style={{fontFamily:T.mono,fontSize:12.5}}>{fmt(s.reach)}</span>
          <span className="text-right" style={{fontFamily:T.mono,fontSize:12.5}}>{er(s).toFixed(1)}</span>
          <span className="text-right" style={{fontFamily:T.mono,fontSize:12.5}}>{fmt(s.saves)}</span>
          <span className="text-right" style={{fontFamily:T.mono,fontSize:12.5}}>{fmt(s.follows)}</span>
          <button onClick={()=>onDelSnap(s.id)} className="sm-btn flex justify-end"><Icon name="trash" size={13} color={T.faint}/></button>
        </div>)}
      </div>
    </div>}
  </div>;
}
function Stat({label,v}){return <div><div style={{fontFamily:T.mono,fontSize:15,fontWeight:600}}>{v}</div><div style={{fontSize:10.5,color:T.faint,textTransform:"uppercase",letterSpacing:".05em"}}>{label}</div></div>;}

/* ---- account & outcomes (admin) ---- */
function AccountAdmin({client,flash}){
  const [rows,setRows]=useState(null);
  const [add,setAdd]=useState(false);

/* ========================== REPORT =========================== */
const PRESETS=[["l7","Last 7 days"],["l30","Last 30 days"],["month","This month"],["lastmonth","Last month"]];
const DAY=864e5;
function getRange(preset){
  const now=new Date(),Y=now.getFullYear(),M=now.getMonth();
  if(preset==="l7")return {start:new Date(now-7*DAY),end:now,prevStart:new Date(now-14*DAY),prevEnd:new Date(now-7*DAY),label:"Last 7 days"};
  if(preset==="l30")return {start:new Date(now-30*DAY),end:now,prevStart:new Date(now-60*DAY),prevEnd:new Date(now-30*DAY),label:"Last 30 days"};
  if(preset==="month")return {start:new Date(Y,M,1),end:now,prevStart:new Date(Y,M-1,1),prevEnd:new Date(Y,M,1),label:new Date(Y,M,1).toLocaleString(undefined,{month:"long",year:"numeric"})};
  return {start:new Date(Y,M-1,1),end:new Date(Y,M,1),prevStart:new Date(Y,M-2,1),prevEnd:new Date(Y,M-1,1),label:new Date(Y,M-1,1).toLocaleString(undefined,{month:"long",year:"numeric"})};
}
const within=(iso,a,b)=>{const d=new Date(iso);return d>=a&&d<b;};
function periodMetrics(posts,latestByPost,metrics,a,b){
  const inPosts=posts.filter(p=>within(p.published_at,a,b));
  const ls=inPosts.map(p=>latestByPost[p.id]).filter(Boolean);
  const mIn=metrics.filter(m=>within(m.measured_at,a,b));
  return {
    postCount:inPosts.length,
    reach:ls.reduce((s,x)=>s+num(x.reach),0),
    avgEr:ls.length?ls.reduce((s,x)=>s+er(x),0)/ls.length:0,
    saves:ls.reduce((s,x)=>s+num(x.saves),0),
    follows:ls.reduce((s,x)=>s+num(x.follows),0),
    followers:mIn.length?num(mIn[mIn.length-1].followers):null,
    enquiries:mIn.reduce((s,x)=>s+num(x.enquiries),0),
    bookings:mIn.reduce((s,x)=>s+num(x.bookings),0),
    topPosts:[...inPosts].map(p=>({p,s:latestByPost[p.id]})).filter(x=>x.s).sort((x,y)=>er(y.s)-er(x.s)).slice(0,5),
  };
}

      <div className="card rounded-xl p-4 mb-4" style={{background:T.surface,border:"1px solid "+T.line}}>
        <h3 style={{fontSize:13.5,fontWeight:600,marginBottom:3}}>Top posts this period</h3>
        <p style={{fontSize:11.5,color:T.faint,marginBottom:10}}>{cur.postCount} post{cur.postCount!==1?"s":""} published · ranked by engagement</p>
        {cur.topPosts.length===0? <p style={{fontSize:12.5,color:T.faint}}>No posts published in this period.</p> :
         <div className="rounded-lg overflow-hidden" style={{border:"1px solid "+T.lineSoft}}>
           <div className="grid px-3 py-2 text-xs" style={{gridTemplateColumns:"2fr .9fr .8fr .8fr",background:T.surface2,color:T.faint,fontFamily:T.mono}}>
             <span>POST</span><span className="text-right">REACH</span><span className="text-right">ENG%</span><span className="text-right">SAVES</span>
           </div>
           {cur.topPosts.map(({p,s})=><div key={p.id} className="grid px-3 py-2 items-center text-sm" style={{gridTemplateColumns:"2fr .9fr .8fr .8fr",borderTop:"1px solid "+T.lineSoft}}>
             <span className="min-w-0"><span className="truncate" style={{display:"block",fontWeight:500,fontSize:13}}>{p.title||"Untitled"}</span><span style={{fontSize:11,color:T.faint}}>{p.format}</span></span>
             <span className="text-right" style={{fontFamily:T.mono,fontSize:12.5}}>{fmt(s.reach)}</span>
             <span className="text-right" style={{fontFamily:T.mono,fontSize:12.5,color:T.brass}}>{er(s).toFixed(1)}</span>
             <span className="text-right" style={{fontFamily:T.mono,fontSize:12.5}}>{fmt(s.saves)}</span>
           </div>)}
         </div>}
      </div>

      <p style={{fontSize:10.5,color:T.faint,textAlign:"center",marginTop:14}}>Prepared by Story &amp; Motion · {client.name} · {r.label}</p>
    </div>
  </div>;
}
function Metric({label,v,cur,prev,tone}){
  const has=prev>0; const dp=has?((cur-prev)/prev*100):null; const up=dp!=null&&dp>=0;
  return <div className="card rounded-xl p-3.5" style={{background:T.surface,border:"1px solid "+T.line}}>
    <div style={{color:T.faint,fontSize:11.5}}>{label}</div>
    <div className="flex items-end justify-between gap-2 mt-1.5">
      <div style={{fontSize:22,fontWeight:600,fontFamily:T.mono,color:tone||T.ink}}>{v}</div>
      {dp!=null && <span style={{fontSize:11.5,fontFamily:T.mono,fontWeight:600,color:up?T.good:T.bad}}>{up?"▲":"▼"} {Math.abs(dp).toFixed(0)}%</span>}
    </div>
  </div>;
}

/* --------------------------- bits --------------------------- */
function Empty({title,body,action}){
  return <div className="rounded-xl flex flex-col items-center justify-center text-center py-14 px-6" style={{background:T.surface,border:"1px dashed "+T.line}}>
    <h3 style={{fontSize:17,fontWeight:600}}>{title}</h3><p style={{color:T.sub,fontSize:13.5,maxWidth:380,marginTop:6}}>{body}</p>{action&&<div className="mt-5">{action}</div>}
  </div>;
}
function Toast({m,bad}){
  return <div className="fixed bottom-5 left-1/2 -translate-x-1/2 z-50 px-4 py-2.5 rounded-lg text-sm flex items-center gap-2" style={{background:bad?"#FBEEEA":"#1C1A16",color:bad?T.bad:"#fff",border:bad?"1px solid #F0D4CC":"none",boxShadow:"0 8px 24px rgba(0,0,0,.18)"}}>
    <Icon name={bad?"x":"check"} size={15} color={bad?T.bad:"#fff"}/>{m}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
