function Icon({name,size=16,color="currentColor",style,cls}){
  return <svg className={cls} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color}
    strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0,...style}}
    dangerouslySetInnerHTML={{__html:ICONS[name]||""}}/>;
}
const FORMATS=[{key:"Reel",icon:"film"},{key:"Carousel",icon:"images"},{key:"Single image",icon:"image"},{key:"Story",icon:"clapperboard"}];

/* helpers */
const num=v=>isNaN(parseFloat(v))?0:parseFloat(v);
const fmt=n=>{n=num(n);if(n>=1e6)return(n/1e6).toFixed(n%1e6?1:0)+"M";if(n>=1e3)return(n/1e3).toFixed(n%1e3?1:0)+"k";return String(Math.round(n));};
const pct=n=>num(n).toFixed(1)+"%";
const interactions=p=>num(p.likes)+num(p.comments)+num(p.shares)+num(p.saves);
const er=p=>num(p.reach)>0?(interactions(p)/num(p.reach))*100:0;
const impact=p=>num(p.reach)>0?((num(p.likes)+num(p.comments)*2+num(p.shares)*3+num(p.saves)*3)/num(p.reach))*100:0;
const parseTags=s=>(s||"").split(/[\s,]+/).map(t=>t.trim().replace(/^#/,"").toLowerCase()).filter(Boolean);
const weekday=d=>["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][new Date(d+"T00:00").getDay()];
const captionLen=p=>(p.caption||"").length;
const hasQ=p=>/\?/.test(p.caption||"");
const CTA_RX=/(link in bio|comment|save this|save it|share|tag a|dm |book|tap|follow|swipe|sign up|enquire|enquiry)/i;
const hasCTA=p=>CTA_RX.test(p.caption||"");
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const blank=()=>({id:uid(),title:"",format:"Reel",date:new Date().toISOString().slice(0,10),caption:"",hashtags:"",music:"",reach:"",likes:"",comments:"",shares:"",saves:"",follows:""});

const SAMPLE=[
  {title:"Suite reveal — golden hour",format:"Reel",date:"2026-05-04",caption:"The 6am light hits different up here ☀️ Save this for your next escape. Link in bio to book direct.",hashtags:"#boutiquehotel #luxurytravel #hotelreels #goldenhour",music:"Aphex — Avril 14th",reach:41200,likes:2380,comments:142,shares:410,saves:1290,follows:86},
  {title:"Terrace dinner ambience",format:"Reel",date:"2026-05-12",caption:"Dinner with a view. Tag who you'd bring.",hashtags:"#hotelrestaurant #finedining #terrace #luxuryhotel",music:"Men I Trust — Show Me How",reach:28700,likes:1610,comments:95,shares:188,saves:540,follows:41},
  {title:"Spa morning ritual",format:"Reel",date:"2026-05-21",caption:"Slow mornings only. Save this for the weekend you deserve 🤍",hashtags:"#spa #wellness #luxuryhotel #hotelreels",music:"Men I Trust — Show Me How",reach:33500,likes:1980,comments:120,shares:305,saves:980,follows:73},
  {title:"Room tour — the corner suite",format:"Carousel",date:"2026-05-27",caption:"Swipe through your next stay.",hashtags:"#hotel #roomtour #boutiquehotel",music:"",reach:11200,likes:610,comments:44,shares:52,saves:300,follows:28},
].map(p=>({...blank(),...p}));

/* storage */
const get=(k,fb)=>{try{const r=localStorage.getItem(k);return r?JSON.parse(r):fb;}catch{return fb;}};
const set=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};

/* markdown */
function mdToHtml(md){
  let h=(md||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  h=h.replace(/^### (.*)$/gm,"<h4>$1</h4>").replace(/^## (.*)$/gm,"<h3>$1</h3>").replace(/^# (.*)$/gm,"<h2>$1</h2>");
  h=h.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>");
  h=h.replace(/(?:^|\n)((?:[-*] .*(?:\n|$))+)/g,(m,b)=>"\n<ul>"+b.trim().split("\n").map(l=>"<li>"+l.replace(/^[-*]\s+/,"")+"</li>").join("")+"</ul>");
  h=h.replace(/(?:^|\n)((?:\d+\. .*(?:\n|$))+)/g,(m,b)=>"\n<ol>"+b.trim().split("\n").map(l=>"<li>"+l.replace(/^\d+\.\s+/,"")+"</li>").join("")+"</ol>");
  h=h.split(/\n{2,}/).map(blk=>{const t=blk.trim();if(!t)return"";return /^<(h\d|ul|ol)/.test(t)?t:"<p>"+t.replace(/\n/g,"<br>")+"</p>";}).join("\n");
  return h;
}

/* ============================ APP ============================ */
function App(){
  const [projects,setProjects]=useState(()=>{
    let p=get(PROJECTS_KEY,null);
    if(!p||!p.length){p=[{id:uid(),name:"My Brand",industry:"Hotel",createdAt:Date.now()}];set(PROJECTS_KEY,p);}
    return p;
  });
  const [currentId,setCurrentId]=useState(()=>get(CURRENT_KEY,null)||projects[0].id);
  const project=projects.find(p=>p.id===currentId)||projects[0];

  const [posts,setPosts]=useState(()=>get(postsKey(project.id),[]));
  const [tab,setTab]=useState("overview");
  const [editing,setEditing]=useState(null);
  const [projModal,setProjModal]=useState(null);
  const [query,setQuery]=useState(""); const [filterFmt,setFilterFmt]=useState("All"); const [sortKey,setSortKey]=useState("date");

  useEffect(()=>{set(PROJECTS_KEY,projects);},[projects]);
  useEffect(()=>{set(CURRENT_KEY,currentId);setPosts(get(postsKey(currentId),[]));setTab("overview");},[currentId]);
  useEffect(()=>{set(postsKey(project.id),posts);},[posts]);

  const upsert=p=>{setPosts(cur=>{const i=cur.findIndex(x=>x.id===p.id);if(i===-1)return[p,...cur];const n=[...cur];n[i]=p;return n;});setEditing(null);};
  const remove=id=>setPosts(cur=>cur.filter(x=>x.id!==id));

  const saveProject=pr=>{
    setProjects(cur=>{const i=cur.findIndex(x=>x.id===pr.id);if(i===-1)return[...cur,pr];const n=[...cur];n[i]=pr;return n;});
    setCurrentId(pr.id);setProjModal(null);
  };
  const deleteProject=id=>{
    if(projects.length<=1){window.alert("Keep at least one project.");return;}
    if(!window.confirm("Delete this project and its data?"))return;
    try{localStorage.removeItem(postsKey(id));localStorage.removeItem(reportKey(id));}catch{}
    const rest=projects.filter(p=>p.id!==id);setProjects(rest);setCurrentId(rest[0].id);setProjModal(null);
  };

  const exportCSV=()=>{
    const cols=["title","format","date","reach","likes","comments","shares","saves","follows","engagement_%","music","hashtags","caption"];
    const rows=posts.map(p=>[p.title,p.format,p.date,p.reach,p.likes,p.comments,p.shares,p.saves,p.follows,er(p).toFixed(2),p.music,p.hashtags,(p.caption||"").replace(/\n/g," ")]);
    const esc=v=>'"'+String(v??"").replace(/"/g,'""')+'"';
    const csv=[cols,...rows].map(r=>r.map(esc).join(",")).join("\n");
    const url=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
    const a=document.createElement("a");a.href=url;a.download=project.name.replace(/\s+/g,"-").toLowerCase()+"-"+new Date().toISOString().slice(0,10)+".csv";a.click();URL.revokeObjectURL(url);
  };

  return (
    <div style={{background:T.bg,color:T.text,fontFamily:T.sans,minHeight:"100%"}} className="w-full">
      <div className="max-w-6xl mx-auto px-4 sm:px-6 py-6">
        <TopBar project={project} projects={projects} setCurrentId={setCurrentId}
          onNewProject={()=>setProjModal({id:uid(),name:"",industry:"Hotel",createdAt:Date.now(),_new:true})}
          onEditProject={()=>setProjModal({...project})}
          onAdd={()=>setEditing(blank())} onExport={exportCSV} hasData={posts.length>0}/>
        <Tabs tab={tab} setTab={setTab}/>
        {tab==="ai" ? (
          <AITab project={project} posts={posts}/>
        ) : posts.length===0 ? (
          <EmptyState onAdd={()=>setEditing(blank())} onSample={()=>setPosts(SAMPLE)}/>
        ) : tab==="overview" ? (
          <Overview posts={posts}/>
        ) : tab==="posts" ? (
          <PostsView posts={posts} query={query} setQuery={setQuery} filterFmt={filterFmt} setFilterFmt={setFilterFmt} sortKey={sortKey} setSortKey={setSortKey} onEdit={setEditing} onDelete={remove}/>
        ) : (
          <Insights posts={posts}/>
        )}
        <Footer count={posts.length} project={project} onClear={()=>posts.length&&window.confirm("Clear all content in this project?")&&setPosts([])}/>
      </div>
      {editing&&<PostForm initial={editing} onSave={upsert} onClose={()=>setEditing(null)}/>}
      {projModal&&<ProjectForm initial={projModal} onSave={saveProject} onDelete={deleteProject} onClose={()=>setProjModal(null)}/>}
    </div>
  );
}

/* --------------------------- TOP BAR -------------------------- */

  const [open,setOpen]=useState(false);
  return (
    <div className="mb-6">
      <div className="flex items-start justify-between gap-4">
        <div>
          <div className="flex items-center gap-2" style={{color:T.faint,fontFamily:T.mono,fontSize:11,letterSpacing:"0.18em"}}>
            <span>STORY &amp; MOTION</span><span style={{color:T.brass}}>·</span><span>PRO</span>
          </div>
          <h1 style={{fontSize:25,fontWeight:600,letterSpacing:"-0.02em",marginTop:4}}>Social Tracker</h1>
        </div>
        <div className="flex items-center gap-2 shrink-0">
          {hasData&&<button onClick={onExport} className="sm-btn flex items-center gap-1.5 px-3 py-2 rounded-md text-sm" style={{background:T.panel,border:"1px solid "+T.line,color:T.sub}}><Icon name="download" size={15} color={T.sub}/><span className="hidden sm:inline">Export</span></button>}
          <button onClick={onAdd} className="sm-btn flex items-center gap-1.5 px-3.5 py-2 rounded-md text-sm font-medium" style={{background:T.brass,color:"#1a1407"}}><Icon name="plus" size={16} color="#1a1407"/> Log post</button>
        </div>
      </div>

      {/* project switcher */}
      <div className="mt-4 flex items-center gap-2 relative">
        <button onClick={()=>setOpen(o=>!o)} className="sm-btn flex items-center gap-2 px-3 py-2 rounded-lg text-sm" style={{background:T.panel,border:"1px solid "+T.line}}>
          <Icon name="folder" size={15} color={T.brass}/>
          <span style={{fontWeight:600}}>{project.name}</span>
          <span style={{fontSize:11,color:T.faint,fontFamily:T.mono,padding:"1px 6px",border:"1px solid "+T.line,borderRadius:5}}>{project.industry}</span>
          <Icon name="chevron-down" size={14} color={T.sub}/>

        <button onClick={onEditProject} className="sm-btn p-2 rounded-lg" style={{background:T.panel,border:"1px solid "+T.line}} title="Edit project"><Icon name="pencil" size={14} color={T.sub}/></button>
        {open&&(
          <>
            <div className="fixed inset-0 z-10" onClick={()=>setOpen(false)}/>
            <div className="absolute z-20 top-full mt-1 left-0 rounded-lg overflow-hidden w-64" style={{background:T.panel2,border:"1px solid "+T.line,boxShadow:"0 10px 30px rgba(0,0,0,.5)"}}>
              {projects.map(p=>(
                <button key={p.id} onClick={()=>{setCurrentId(p.id);setOpen(false);}} className="row-hover w-full text-left px-3 py-2.5 flex items-center justify-between gap-2" style={{borderBottom:"1px solid "+T.lineSoft}}>
                  <span className="flex items-center gap-2 min-w-0"><Icon name="folder" size={14} color={p.id===project.id?T.brass:T.faint}/><span className="truncate" style={{fontSize:13,fontWeight:p.id===project.id?600:400}}>{p.name}</span></span>
                  <span style={{fontSize:10.5,color:T.faint,fontFamily:T.mono}}>{p.industry}</span>
                </button>
              ))}
              <button onClick={()=>{setOpen(false);onNewProject();}} className="row-hover w-full text-left px-3 py-2.5 flex items-center gap-2" style={{color:T.brass}}>
                <Icon name="plus-circle" size={15} color={T.brass}/><span style={{fontSize:13,fontWeight:600}}>New project</span>
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

/* ---------------------------- TABS ---------------------------- */
function Tabs({tab,setTab}){
  const items=[{k:"overview",label:"Overview",icon:"bar-chart"},{k:"posts",label:"Posts",icon:"layout-grid"},{k:"insights",label:"What's working",icon:"sparkles"},{k:"ai",label:"AI strategy",icon:"sparkles"}];
  return (
    <div className="flex gap-1 mb-6 overflow-x-auto" style={{borderBottom:"1px solid "+T.line}}>
      {items.map(({k,label,icon})=>(
        <button key={k} onClick={()=>setTab(k)} className="flex items-center gap-1.5 px-3 sm:px-4 py-2.5 text-sm sm-btn whitespace-nowrap"
          style={{color:tab===k?T.text:T.sub,borderBottom:"2px solid "+(tab===k?T.brass:"transparent"),marginBottom:-1,fontWeight:tab===k?600:400}}>
          <Icon name={icon} size={15} color={k==="ai"?T.brass:(tab===k?T.text:T.sub)}/> {label}
        </button>
      ))}
    </div>
  );
}

/* -------------------------- AI TAB ---------------------------- */
function AITab({project,posts}){
  const [state,setState]=useState({loading:false,error:null});
  const [pw,setPw]=useState(()=>{try{return sessionStorage.getItem("smx_pw")||"";}catch{return"";}});
  const setPassword=v=>{setPw(v);try{sessionStorage.setItem("smx_pw",v);}catch{}};
  const [report,setReport]=useState(()=>get(reportKey(project.id),null));
  useEffect(()=>{setReport(get(reportKey(project.id),null));setState({loading:false,error:null});},[project.id]);

  const run=async()=>{
    if(posts.length<2){setState({loading:false,error:"Log at least 2 posts before generating a report — Claude needs something to compare."});return;}
    setState({loading:true,error:null});
    try{
      const compact=posts.slice(0,80).map(p=>({title:p.title,format:p.format,date:p.date,reach:num(p.reach),likes:num(p.likes),comments:num(p.comments),shares:num(p.shares),saves:num(p.saves),follows:num(p.follows),engagement:+er(p).toFixed(2),music:p.music,hashtags:p.hashtags,caption:p.caption}));
      const res=await fetch("/api/analyze",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({industry:project.industry,projectName:project.name,posts:compact,password:pw})});
      if(!res.ok){const t=await res.text();throw new Error("Server "+res.status+" — "+t.slice(0,160));}
      const data=await res.json();
      const obj={text:data.report||"No report returned.",at:Date.now()};
      setReport(obj);set(reportKey(project.id),obj);setState({loading:false,error:null});
    }catch(e){
      const msg=/Failed to fetch|NetworkError/.test(e.message)?"Couldn't reach the AI backend. This feature only works on the deployed (Vercel) version with your API key set — see the README. The rest of the tracker works offline.":e.message;
      setState({loading:false,error:msg});
    }
  };

  return (
    <div>
      <div className="rounded-xl p-5 mb-4" style={{background:T.panel,border:"1px solid "+T.brassDim}}>
        <div className="flex items-start justify-between gap-4 flex-wrap">
          <div className="max-w-md">
            <h3 style={{fontSize:16,fontWeight:600}}>Claude analyses <span style={{color:T.brass}}>{project.name}</span></h3>
            <p style={{color:T.sub,fontSize:13,marginTop:4}}>A senior {project.industry.toLowerCase()} social strategist reads this project's numbers and returns what's working, what isn't, and a concrete 30-day plan with content ideas.</p>
          </div>

/* --------------------------- OVERVIEW ------------------------- */
function Overview({posts}){
  const k=useMemo(()=>{
    const reach=posts.reduce((a,p)=>a+num(p.reach),0);
    const follows=posts.reduce((a,p)=>a+num(p.follows),0);
    const avgEr=posts.length?posts.reduce((a,p)=>a+er(p),0)/posts.length:0;
    const saves=posts.reduce((a,p)=>a+num(p.saves),0);
    const top=[...posts].sort((a,b)=>impact(b)-impact(a))[0];
    return{reach,follows,avgEr,saves,top};
  },[posts]);
  const timeData=useMemo(()=>[...posts].sort((a,b)=>a.date.localeCompare(b.date)).map(p=>({label:p.date.slice(5),value:+er(p).toFixed(1)})),[posts]);
  return (
    <div>
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-5">
        <KPI icon="eye" label="Total reach" value={fmt(k.reach)} tone={T.steel}/>
        <KPI icon="trending-up" label="Avg engagement" value={pct(k.avgEr)} tone={T.brass}/>
        <KPI icon="bookmark" label="Total saves" value={fmt(k.saves)} tone={T.good}/>
        <KPI icon="user-plus" label="Followers gained" value={fmt(k.follows)} tone={T.text}/>
      </div>
      {k.top&&(
        <div className="rounded-xl p-4 mb-5 flex items-center gap-4" style={{background:T.panel,border:"1px solid "+T.brassDim}}>
          <div className="shrink-0 w-11 h-11 rounded-lg flex items-center justify-center" style={{background:T.raise,border:"1px solid "+T.brassDim}}><Icon name="sparkles" size={20} color={T.brass}/></div>
          <div className="min-w-0">
            <div style={{fontSize:11,color:T.faint,fontFamily:T.mono,letterSpacing:"0.14em"}}>TOP PERFORMER</div>
            <div className="truncate" style={{fontWeight:600,fontSize:15}}>{k.top.title||"Untitled"}</div>
            <div style={{color:T.sub,fontSize:12.5}}>{k.top.format} · {pct(er(k.top))} engagement · {fmt(k.top.saves)} saves · {fmt(k.top.reach)} reach</div>
          </div>
        </div>
      )}
      <Panel title="Engagement over time" sub="Engagement rate per post, in order"><LineMini data={timeData}/></Panel>
    </div>
  );
}
function KPI({icon,label,value,tone}){
  return (
    <div className="rounded-xl p-3.5" style={{background:T.panel,border:"1px solid "+T.line}}>
      <div className="flex items-center justify-between"><span style={{color:T.faint,fontSize:11.5}}>{label}</span><Icon name={icon} size={15} color={tone}/></div>
      <div style={{fontSize:24,fontWeight:600,fontFamily:T.mono,marginTop:8,color:tone}}>{value}</div>
    </div>
  );
}
function LineMini({data}){
  if(!data.length)return <p style={{color:T.faint,fontSize:12.5}}>Log a few posts to see the trend.</p>;
  const W=800,H=220,pad=28,max=Math.max(...data.map(d=>d.value),1);
  const stepX=data.length>1?(W-pad*2)/(data.length-1):0;
  const X=i=>pad+i*stepX,Y=v=>H-pad-(v/max)*(H-pad*2);
  const pts=data.map((d,i)=>X(i)+","+Y(d.value)).join(" ");const grid=[0,0.5,1];
  return (
    <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",height:"auto",display:"block"}}>
      {grid.map((g,i)=><line key={i} x1={pad} x2={W-pad} y1={Y(max*g)} y2={Y(max*g)} stroke={T.lineSoft} strokeWidth="1"/>)}
      {grid.map((g,i)=><text key={"t"+i} x={4} y={Y(max*g)+4} fill={T.faint} fontSize="11" fontFamily={T.mono}>{(max*g).toFixed(0)}%</text>)}
      {data.length>1&&<polyline points={pts} fill="none" stroke={T.brass} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>}
      {data.map((d,i)=><circle key={i} cx={X(i)} cy={Y(d.value)} r="4" fill={T.brass}><title>{d.label}: {d.value}%</title></circle>)}
    </svg>
  );
}

function Panel({title,sub,children,right}){
  return (
    <div className="rounded-xl p-4 mb-4" style={{background:T.panel,border:"1px solid "+T.line}}>
      <div className="flex items-end justify-between mb-3"><div><h3 style={{fontSize:14.5,fontWeight:600}}>{title}</h3>{sub&&<p style={{color:T.faint,fontSize:12}}>{sub}</p>}</div>{right}</div>
      {children}
    </div>
  );
}

/* ---------------------------- POSTS --------------------------- */
function PostsView({posts,query,setQuery,filterFmt,setFilterFmt,sortKey,setSortKey,onEdit,onDelete}){

    const by={date:(a,b)=>b.date.localeCompare(a.date),reach:(a,b)=>num(b.reach)-num(a.reach),engagement:(a,b)=>er(b)-er(a),saves:(a,b)=>num(b.saves)-num(a.saves),impact:(a,b)=>impact(b)-impact(a)};

          <Icon name="search" size={15} color={T.faint}/><input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Search captions, tags, audio…" className="bg-transparent text-sm w-full" style={{color:T.text}}/>
        </div>
        <Sel value={filterFmt} onChange={setFilterFmt} options={[{v:"All",l:"All formats"},...FORMATS.map(f=>({v:f.key,l:f.key}))]}/>
        <Sel value={sortKey} onChange={setSortKey} options={[{v:"date",l:"Newest"},{v:"engagement",l:"Top engagement"},{v:"reach",l:"Most reach"},{v:"saves",l:"Most saves"},{v:"impact",l:"Impact score"}]}/>
      </div>
      <div className="rounded-xl overflow-hidden" style={{border:"1px solid "+T.line}}>
        <div className="hidden md:grid px-4 py-2.5 text-xs" style={{gridTemplateColumns:"1.8fr .9fr .8fr .8fr .8fr .8fr 64px",background:T.panel2,color:T.faint,fontFamily:T.mono,letterSpacing:"0.08em"}}>
          <span>POST</span><span className="text-right">REACH</span><span className="text-right">ENG%</span><span className="text-right">SAVES</span><span className="text-right">SHARES</span><span className="text-right">DATE</span><span></span>
        </div>
        {view.map(p=><PostRow key={p.id} p={p} onEdit={onEdit} onDelete={onDelete}/>)}
        {!view.length&&<div className="px-4 py-8 text-center text-sm" style={{color:T.faint}}>Nothing matches that filter.</div>}

function PostRow({p,onEdit,onDelete}){

        <span className="text-right hidden md:block" style={{fontFamily:T.mono,fontSize:12,color:T.faint}}>{p.date.slice(5)}</span>

function Mini({icon,label,v}){return <div className="flex items-center gap-2"><Icon name={icon} size={14} color={T.faint}/><span style={{color:T.sub,fontSize:12.5}}>{label}</span><span style={{fontFamily:T.mono,fontSize:13,marginLeft:"auto"}}>{v}</span></div>;}

/* --------------------------- INSIGHTS ------------------------- */
function Insights({posts}){
  const tagStats=useMemo(()=>{const m={};posts.forEach(p=>parseTags(p.hashtags).forEach(t=>(m[t]=m[t]||[]).push(p)));return Object.entries(m).map(([tag,ps])=>({tag,n:ps.length,er:ps.reduce((a,p)=>a+er(p),0)/ps.length,reach:ps.reduce((a,p)=>a+num(p.reach),0)/ps.length})).filter(t=>t.n>=2).sort((a,b)=>b.er-a.er);},[posts]);
  const musicStats=useMemo(()=>{const m={};posts.forEach(p=>{const x=(p.music||"").trim();if(x)(m[x]=m[x]||[]).push(p);});return Object.entries(m).map(([music,ps])=>({music,n:ps.length,er:ps.reduce((a,p)=>a+er(p),0)/ps.length,reach:ps.reduce((a,p)=>a+num(p.reach),0)/ps.length})).sort((a,b)=>b.er-a.er);},[posts]);
  const fmtStats=useMemo(()=>FORMATS.map(f=>{const ps=posts.filter(p=>p.format===f.key);return{format:f.key,n:ps.length,er:ps.length?ps.reduce((a,p)=>a+er(p),0)/ps.length:0};}).filter(f=>f.n>0).sort((a,b)=>b.er-a.er),[posts]);
  const dayStats=useMemo(()=>{const order=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];const m={};posts.forEach(p=>{const d=weekday(p.date);(m[d]=m[d]||[]).push(p);});return order.filter(d=>m[d]).map(d=>({day:d,n:m[d].length,er:m[d].reduce((a,p)=>a+er(p),0)/m[d].length})).sort((a,b)=>b.er-a.er);},[posts]);
  const cap=useMemo(()=>{const avg=arr=>arr.length?arr.reduce((a,p)=>a+er(p),0)/arr.length:0;const buckets=[{label:"Short (<100)",ps:posts.filter(p=>captionLen(p)>0&&captionLen(p)<100)},{label:"Medium (100–300)",ps:posts.filter(p=>captionLen(p)>=100&&captionLen(p)<=300)},{label:"Long (>300)",ps:posts.filter(p=>captionLen(p)>300)}].filter(b=>b.ps.length).map(b=>({label:b.label,n:b.ps.length,er:avg(b.ps)}));return{buckets,question:{yes:avg(posts.filter(hasQ)),no:avg(posts.filter(p=>!hasQ(p))),nYes:posts.filter(hasQ).length},cta:{yes:avg(posts.filter(hasCTA)),no:avg(posts.filter(p=>!hasCTA(p))),nYes:posts.filter(hasCTA).length}};},[posts]);
  const small=posts.length<4;
  return (
    <div>
      {small&&<div className="rounded-lg px-4 py-2.5 mb-4 text-sm flex items-center gap-2" style={{background:T.panel,border:"1px solid "+T.line,color:T.sub}}><Icon name="sparkles" size={14} color={T.brass}/> Early signal — log a few more posts and these patterns get sharper.</div>}
      <div className="grid lg:grid-cols-2 gap-4">
        <Panel title="Hashtags pulling weight" sub="Avg engagement where a tag appears (2+ posts)">{tagStats.length?<RankList rows={tagStats.slice(0,7).map(t=>({key:t.tag,label:"#"+t.tag,meta:t.n+" posts · "+fmt(t.reach)+" avg reach",value:pct(t.er),v:t.er}))} max={tagStats[0].er}/>:<Hint>Add hashtags to 2+ posts to compare them.</Hint>}</Panel>
        <Panel title="Audio that travels" sub="Avg engagement per track">{musicStats.length?<RankList tone={T.steel} rows={musicStats.slice(0,7).map(m=>({key:m.music,label:m.music,meta:m.n+" use"+(m.n>1?"s":"")+" · "+fmt(m.reach)+" avg reach",value:pct(m.er),v:m.er}))} max={musicStats[0].er}/>:<Hint>Add an audio/track name to your reels to see this.</Hint>}</Panel>
        <Panel title="Format performance" sub="Avg engagement by post type">{fmtStats.length?<RankList rows={fmtStats.map(f=>({key:f.format,label:f.format,meta:f.n+" post"+(f.n>1?"s":""),value:pct(f.er),v:f.er}))} max={fmtStats[0].er}/>:<Hint>No posts yet.</Hint>}</Panel>
        <Panel title="Best day to post" sub="Avg engagement by weekday">{dayStats.length?<RankList tone={T.steel} rows={dayStats.map(d=>({key:d.day,label:d.day,meta:d.n+" post"+(d.n>1?"s":""),value:pct(d.er),v:d.er}))} max={dayStats[0].er}/>:<Hint>Log posts across different days to see this.</Hint>}</Panel>
      </div>
      <Panel title="Caption signals" sub="What your writing is doing to engagement">
        <div className="grid sm:grid-cols-3 gap-3">
          <Signal title="Length" rows={cap.buckets.map(b=>({label:b.label,value:pct(b.er),sub:String(b.n)}))}/>
          <Signal title="Asks a question?" rows={[{label:"With “?”",value:pct(cap.question.yes),sub:String(cap.question.nYes),hot:cap.question.yes>cap.question.no},{label:"Without",value:pct(cap.question.no),sub:String(posts.length-cap.question.nYes)}]}/>
          <Signal title="Has a call-to-action?" rows={[{label:"With CTA",value:pct(cap.cta.yes),sub:String(cap.cta.nYes),hot:cap.cta.yes>cap.cta.no},{label:"Without",value:pct(cap.cta.no),sub:String(posts.length-cap.cta.nYes)}]}/>
        </div>
      </Panel>
    </div>
  );
}
function RankList({rows,max,tone=T.brass}){
  return <div className="flex flex-col gap-2.5">{rows.map(r=>(
    <div key={r.key}>
      <div className="flex items-baseline justify-between gap-3 mb-1"><span className="truncate" style={{fontSize:13,fontWeight:500}}>{r.label}</span><span style={{fontFamily:T.mono,fontSize:13,color:tone,flexShrink:0}}>{r.value}</span></div>
      <div className="h-1.5 rounded-full overflow-hidden" style={{background:T.raise}}><div style={{width:(max?Math.max(6,(r.v/max)*100):0)+"%",height:"100%",background:tone,opacity:0.85}}/></div>
      <div style={{fontSize:11,color:T.faint,marginTop:3}}>{r.meta}</div>
    </div>
  ))}</div>;
}
function Signal({title,rows}){
  return <div className="rounded-lg p-3" style={{background:T.panel2,border:"1px solid "+T.lineSoft}}>
    <div style={{fontSize:11.5,color:T.faint,fontFamily:T.mono,letterSpacing:"0.08em",marginBottom:8}}>{title.toUpperCase()}</div>

  </div>;
}
function Hint({children}){return <p style={{color:T.faint,fontSize:12.5,padding:"8px 0"}}>{children}</p>;}

          <label className="block"><span style={{fontSize:11.5,color:T.faint,fontFamily:T.mono,letterSpacing:"0.06em"}}>INDUSTRY</span>
            <select value={f.industry} onChange={e=>setF({...f,industry:e.target.value})} className="w-full mt-1 px-3 py-2 rounded-md text-sm" style={{background:T.bg,border:"1px solid "+T.line,color:T.text}}>{INDUSTRIES.map(x=><option key={x} value={x} style={{background:T.panel2}}>{x}</option>)}</select>
            <span style={{fontSize:11,color:T.faint,marginTop:4,display:"block"}}>Industry tailors the AI strategy advice.</span></label>
        </div>
        <div className="flex gap-2 px-5 py-4" style={{borderTop:"1px solid "+T.line}}>
          {!initial._new&&<button onClick={()=>onDelete(f.id)} className="sm-btn px-3 py-2.5 rounded-md text-sm" style={{background:T.panel2,border:"1px solid "+T.bad,color:T.bad}}><Icon name="trash" size={14} color={T.bad}/></button>}
          <button onClick={onClose} className="sm-btn flex-1 py-2.5 rounded-md text-sm" style={{background:T.panel2,border:"1px solid "+T.line,color:T.sub}}>Cancel</button>
          <button onClick={()=>f.name.trim()&&onSave({...f,_new:undefined})} className="sm-btn flex-1 py-2.5 rounded-md text-sm font-medium" style={{background:T.brass,color:"#1a1407"}}>{initial._new?"Create":"Save"}</button>
        </div>
      </div>
    </div>
  );
}

/* ------------------------- POST FORM -------------------------- */
function PostForm({initial,onSave,onClose}){
  const [f,setF]=useState(initial);const isNew=!initial.title&&!initial.reach;const set=(k,v)=>setF(s=>({...s,[k]:v}));
  const Field=({label,k,type="text",ph,span})=>(<label className={span?"sm:col-span-2 block":"block"}><span style={{fontSize:11.5,color:T.faint,fontFamily:T.mono,letterSpacing:"0.06em"}}>{label.toUpperCase()}</span><input type={type} value={f[k]} placeholder={ph} onChange={e=>set(k,e.target.value)} className="w-full mt-1 px-3 py-2 rounded-md text-sm" style={{background:T.bg,border:"1px solid "+T.line,color:T.text,fontFamily:type==="number"?T.mono:T.sans}}/></label>);
  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4" style={{background:"rgba(0,0,0,0.6)"}} onClick={onClose}>
      <div className="w-full sm:max-w-lg rounded-t-2xl sm:rounded-2xl overflow-hidden max-h-[92vh] flex flex-col" style={{background:T.panel,border:"1px solid "+T.line}} onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between px-5 py-4" style={{borderBottom:"1px solid "+T.line}}><h3 style={{fontWeight:600,fontSize:16}}>{isNew?"Log a post":"Edit post"}</h3><button onClick={onClose} className="sm-btn p-1.5 rounded"><Icon name="x" size={18} color={T.sub}/></button></div>
        <div className="px-5 py-4 overflow-y-auto">
          <div className="grid sm:grid-cols-2 gap-3">
            <Field label="Title / label" k="title" ph="Suite reveal reel" span/>
            <label className="block"><span style={{fontSize:11.5,color:T.faint,fontFamily:T.mono,letterSpacing:"0.06em"}}>FORMAT</span><select value={f.format} onChange={e=>set("format",e.target.value)} className="w-full mt-1 px-3 py-2 rounded-md text-sm" style={{background:T.bg,border:"1px solid "+T.line,color:T.text}}>{FORMATS.map(x=><option key={x.key} value={x.key} style={{background:T.panel2}}>{x.key}</option>)}</select></label>
            <Field label="Date posted" k="date" type="date"/>
            <div className="sm:col-span-2 mt-1" style={{borderTop:"1px solid "+T.lineSoft,paddingTop:8}}><span style={{fontSize:11,color:T.faint,fontFamily:T.mono,letterSpacing:"0.1em"}}>NUMBERS FROM INSIGHTS</span></div>
            <Field label="Reach / views" k="reach" type="number" ph="0"/><Field label="Followers gained" k="follows" type="number" ph="0"/>
            <Field label="Likes" k="likes" type="number" ph="0"/><Field label="Comments" k="comments" type="number" ph="0"/>
            <Field label="Shares" k="shares" type="number" ph="0"/><Field label="Saves" k="saves" type="number" ph="0"/>
            <div className="sm:col-span-2 mt-1" style={{borderTop:"1px solid "+T.lineSoft,paddingTop:8}}><span style={{fontSize:11,color:T.faint,fontFamily:T.mono,letterSpacing:"0.1em"}}>WHAT MADE THIS POST</span></div>
            <Field label="Audio / music" k="music" ph="Track or sound name" span/>
            <label className="sm:col-span-2 block"><span style={{fontSize:11.5,color:T.faint,fontFamily:T.mono,letterSpacing:"0.06em"}}>HASHTAGS</span><input value={f.hashtags} onChange={e=>set("hashtags",e.target.value)} placeholder="#hotelreels #luxurytravel …" className="w-full mt-1 px-3 py-2 rounded-md text-sm" style={{background:T.bg,border:"1px solid "+T.line,color:T.text}}/></label>
            <label className="sm:col-span-2 block"><span style={{fontSize:11.5,color:T.faint,fontFamily:T.mono,letterSpacing:"0.06em"}}>CAPTION</span><textarea value={f.caption} onChange={e=>set("caption",e.target.value)} rows={3} placeholder="Paste the caption…" className="w-full mt-1 px-3 py-2 rounded-md text-sm resize-none" style={{background:T.bg,border:"1px solid "+T.line,color:T.text,lineHeight:1.5}}/></label>
          </div>
        </div>
        <div className="flex gap-2 px-5 py-4" style={{borderTop:"1px solid "+T.line}}><button onClick={onClose} className="sm-btn flex-1 py-2.5 rounded-md text-sm" style={{background:T.panel2,border:"1px solid "+T.line,color:T.sub}}>Cancel</button><button onClick={()=>onSave(f)} className="sm-btn flex-1 py-2.5 rounded-md text-sm font-medium" style={{background:T.brass,color:"#1a1407"}}>{isNew?"Add post":"Save changes"}</button></div>
      </div>
    </div>
  );
}

function Footer({count,project,onClear}){
  return <div className="flex items-center justify-between mt-6 pt-4 text-xs" style={{borderTop:"1px solid "+T.lineSoft,color:T.faint}}><span style={{fontFamily:T.mono}}>{project.name} · {count} post{count!==1?"s":""} · saved in this browser</span>{count>0&&<button onClick={onClear} className="sm-btn" style={{color:T.faint}}>Clear project</button>}</div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
